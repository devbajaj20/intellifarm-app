name: intellifarm
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.12
  google_fonts: ^6.3.0
  cupertino_icons: ^1.0.8
  firebase_messaging: ^15.1.0
  image_picker: ^1.0.7
  http: ^1.6.0
  location: 6.0.2
  provider: ^6.1.2
  permission_handler: ^11.3.1
  speech_to_text: ^6.6.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_mlkit_translation: ^0.11.0
  confetti: ^0.7.0
  font_awesome_flutter: 10.5.0
  fl_chart: ^0.63.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1   # ✅ CORRECT PLACE

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_final.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/gifs/tractor.gif
    - assets/images/Google.png
    - assets/icon/app_icon_final.png
